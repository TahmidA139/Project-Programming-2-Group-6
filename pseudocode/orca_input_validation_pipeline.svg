     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="polygon14" />
  <text
     x="340"
     y="919"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text15">Sequence valid?</text>
  <!-- No → error -->
  <line
     x1="450"
     y1="919"
     x2="506.98615"
     y2="919"
     stroke="#141413"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line15" />
  <text
     x="474.05869"
     y="909.86768"
     text-anchor="middle"
     style="font-size:12px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#3d3d3a"
     id="text16">No</text>
  <rect
     x="508.63214"
     y="897"
     width="126"
     height="44"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect16" />
  <rect
     x="504.14722"
     y="616.41071"
     width="126"
     height="44"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect16-1" />
  <rect
     x="508.41196"
     y="332.71542"
     width="126"
     height="44"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect16-1-2" />
  <text
     x="613.38641"
     y="854.48901"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:12.7766px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.912613"
     id="text17"
     transform="scale(0.9297242,1.0755878)">Print error and exit</text>
  <text
     x="610.83514"
     y="593.20667"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:12.7766px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.912613"
     id="text17-8"
     transform="scale(0.9297242,1.0755878)">Print error and exit</text>
  <text
     x="617.52277"
     y="330.92374"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:12.7766px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.912613"
     id="text17-8-4"
     transform="scale(0.9297242,1.0755878)">Print error and exit</text>
  <!-- Yes → down -->
  <line
     x1="340"
     y1="971"
     x2="340"
     y2="1027"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line17" />
  <text
     x="352"
     y="1002"
     text-anchor="start"
     style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;"
     id="text18">Yes</text>
  <!-- Write cleaned FASTA -->
  <rect
     x="210"
     y="1027"
     width="260"
     height="60"
     rx="8"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect18" />
  <text
     x="340"
     y="1048"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
