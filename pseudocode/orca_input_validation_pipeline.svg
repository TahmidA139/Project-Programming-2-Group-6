  <line
     x1="340"
     y1="244"
     x2="340"
     y2="305"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line2" />
  <!-- Email valid? diamond -->
  <polygon
     points="340,305 450,357 340,409 230,357"
     fill="rgb(255,255,255)"
