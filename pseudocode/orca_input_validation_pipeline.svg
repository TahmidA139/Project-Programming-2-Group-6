  <line
     x1="340"
     y1="525"
     x2="340"
     y2="586"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line8" />
  <!-- Load successful? diamond -->
  <polygon
     points="340,586 450,638 340,690 230,638"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
