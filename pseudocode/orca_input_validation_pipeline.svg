     y="122"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:500;"
     id="text1">Start</text>
  <line
     x1="340"
     y1="144"
     x2="340"
     y2="200"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line1" />
  <!-- Validate email -->
  <rect
     x="210"
     y="200"
     width="260"
     height="44"
     rx="8"
     fill="rgb(255,255,255)"
