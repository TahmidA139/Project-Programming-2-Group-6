  <text
     x="345.11072"
     y="1164.0852"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:500;font-size:14px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413"
