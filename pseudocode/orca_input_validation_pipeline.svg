  <text
     x="340"
     y="1068"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text20">Return accession and sequence</text>
  <line
     x1="342.63159"
     y1="1087"
     x2="342.63159"
     y2="1142.4854"
     stroke="#141413"
     stroke-width="1.21172"
     fill="none"
     marker-end="url(#arrow)"
