<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="100%"
   viewBox="0 0 680 1484"
   role="img"
   version="1.1"
   id="svg25"
   sodipodi:docname="orca_six_frame_orf_scanner.svg"
   inkscape:version="1.4.3 (0d15f750, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview25"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.37813886"
     inkscape:cx="109.74804"
     inkscape:cy="723.27928"
     inkscape:window-width="1262"
     inkscape:window-height="808"
     inkscape:window-x="0"
     inkscape:window-y="37"
     inkscape:window-maximized="0"
     inkscape:current-layer="svg25" />
  <title
     id="title1">ORCA six-frame ORF scanner flowchart</title>
  <desc
     id="desc1">Flowchart showing the ORCA six-frame ORF scanner from reverse complement computation through per-frame scanning and ORF recording.</desc>
  <defs
     id="defs1">
    <marker
       id="arrow"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="context-stroke"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path1" />
    </marker>
  </defs>
  <!-- START -->
  <rect
     x="270"
     y="100"
     width="140"
     height="44"
     rx="22"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect1" />
  <text
     x="340"
     y="122"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:500;"
     id="text1">Start</text>
  <line
     x1="340"
     y1="144"
     x2="340"
     y2="200"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line1" />
  <!-- Compute reverse complement -->
  <rect
     x="210"
     y="200"
     width="260"
     height="60"
     rx="8"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect2" />
  <text
     x="340"
     y="221"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text2">Compute reverse complement</text>
  <text
     x="340"
     y="241"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text3">of sequence</text>
  <line
     x1="340"
     y1="260"
     x2="340"
     y2="316"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line3" />
  <!-- For each of 6 frames -->
  <rect
     x="210"
     y="316"
     width="260"
     height="60"
     rx="8"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect3" />
  <text
     x="340"
     y="337"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text4">For each frame offset [0, 1, 2]</text>
  <text
     x="340"
     y="357"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text5">scan forward and reverse strand</text>
  <line
     x1="340"
     y1="376"
     x2="340"
     y2="437"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line5" />
  <!-- Find start codons -->
  <rect
     x="210"
     y="437"
     width="260"
     height="60"
     rx="8"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect5" />
  <text
     x="340"
     y="458"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text6">Find all start codon positions</text>
  <text
     x="340"
     y="478"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text7">Find next in-frame stop codon</text>
  <line
     x1="340"
     y1="497"
     x2="340"
     y2="558"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line7" />
  <!-- ORF complete? diamond -->
  <polygon
     points="340,558 450,610 340,662 230,610"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="polygon7" />
  <text
     x="340"
     y="610"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text8">ORF complete?</text>
  <!-- No → skip -->
  <line
     x1="450"
     y1="610"
     x2="518.74878"
     y2="610"
     stroke="#141413"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line8" />
  <text
     x="481.10468"
     y="602.23877"
     text-anchor="middle"
     style="font-size:12px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#3d3d3a"
     id="text9">No</text>
  <rect
     x="521.74652"
     y="588"
     width="126"
     height="44"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect9" />
  <text
     x="621.42798"
     y="574.00623"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:13.1739px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.940994"
     id="text10"
     transform="scale(0.94099377,1.0627063)">Skip — incomplete</text>
  <!-- Yes → down -->
  <line
     x1="340"
     y1="662"
     x2="340"
     y2="723"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line10" />
  <text
     x="352"
     y="695"
     text-anchor="start"
     style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;"
     id="text11">Yes</text>
  <!-- Meets minimum length? diamond -->
  <polygon
     points="340,723 450,775 340,827 230,775"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="polygon11" />
  <text
     x="340"
     y="775"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text12">Meets minimum length?</text>
  <!-- No → skip -->
  <line
     x1="450"
     y1="775"
     x2="515.59235"
     y2="775"
     stroke="#141413"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line12" />
  <text
     x="478.98529"
     y="761.94031"
     text-anchor="middle"
     style="font-size:12px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#3d3d3a"
     id="text13">No</text>
  <rect
     x="516.44812"
     y="754.05969"
     width="126"
     height="44"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect13" />
  <text
     x="620.2782"
     y="725.02527"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:13.0793px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.934239"
     id="text14"
     transform="scale(0.93423903,1.0703899)">Skip — too short</text>
  <!-- Yes → down -->
  <line
     x1="340"
     y1="827"
     x2="340"
     y2="888"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line14" />
  <text
     x="352"
     y="860"
     text-anchor="start"
     style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;"
     id="text15">Yes</text>
  <!-- Longest for this stop? diamond -->
  <polygon
     points="340,888 460,940 340,992 220,940"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="polygon15" />
  <text
     x="340"
     y="930"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text16">Longest ORF at</text>
  <text
     x="340"
     y="950"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text17">this stop position?</text>
  <!-- No → skip -->
  <line
     x1="460"
     y1="940"
     x2="519.82141"
     y2="940"
     stroke="#141413"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line17" />
  <text
     x="502"
     y="928"
     text-anchor="middle"
     style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;"
     id="text18">No</text>
  <rect
     x="522.80621"
     y="918"
     width="126"
     height="44"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect18" />
  <text
     x="584.74652"
     y="940"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:14px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413"
     id="text19">Skip — shorter</text>
  <!-- Yes → down -->
  <line
     x1="340"
     y1="992"
     x2="340"
     y2="1048"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line19" />
  <text
     x="352"
     y="1023"
     text-anchor="start"
     style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;"
     id="text20">Yes</text>
  <!-- Record ORF -->
  <rect
     x="210"
     y="1048"
     width="260"
     height="60"
     rx="8"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect20" />
  <text
     x="340"
     y="1069"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text21">Record ORF: strand, frame,</text>
  <text
     x="340"
     y="1089"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text22">start, end, length, start codon</text>
  <line
     x1="340"
     y1="1108"
     x2="340"
     y2="1164"
     stroke="rgb(20,20,19)"
     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line22" />
  <!-- Return ORF list -->
  <rect
     x="210"
     y="1164"
     width="260"
     height="60"
     rx="8"
     fill="rgb(255,255,255)"
     stroke="rgb(20,20,19)"
     stroke-width="0.5"
     id="rect22" />
  <text
     x="340"
     y="1185"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text23">Repeat for all frames</text>
  <text
     x="340"
     y="1205"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;"
     id="text24">Return flat list of all ORF records</text>
  <line
     x1="340"
     y1="1224"
     x2="340"
     y2="1273.6699"
     stroke="#141413"
     stroke-width="1.37153"
     fill="none"
     marker-end="url(#arrow)"
     id="line24" />
  <!-- DONE -->
  <rect
     x="270.03241"
     y="1274.3571"
     width="139.93513"
     height="38.462189"
     rx="21.989807"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.309277"
     id="rect24" />
  <text
     x="338.9054"
     y="1295.23"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:500;font-size:14px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413"
     id="text25">Done</text>
</svg>
