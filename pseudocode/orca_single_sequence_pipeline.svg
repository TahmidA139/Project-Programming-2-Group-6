<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="100%"
   viewBox="0 0 680 1484"
   role="img"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <title>ORCA single-sequence pipeline flowchart</title>
  <desc>Flowchart showing the ORCA single-sequence pipeline from CLI parsing through ORF detection, statistics calculation, and summary report writing.</desc>
  <defs>
    <marker
       id="arrow"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="context-stroke"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- 1. START -->
  <rect x="270" y="100" width="140" height="44" rx="22" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:500;">Start</text>

  <line x1="340" y1="144" x2="340" y2="200" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- 2. Parse CLI arguments -->
  <rect x="210" y="200" width="260" height="44" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Parse CLI arguments</text>

  <line x1="340" y1="244" x2="340" y2="300" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- 3. Validate inputs -->
  <rect x="210" y="300" width="260" height="60" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="321" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Validate email, start codons,</text>
  <text x="340" y="341" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">and minimum ORF length</text>

  <line x1="340" y1="360" x2="340" y2="416" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- 4. Inputs valid? diamond -->
  <polygon points="340,416 450,468 340,520 230,468" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="468" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Inputs valid?</text>

  <line x1="450" y1="468" x2="544" y2="468" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="497" y="456" text-anchor="middle" style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;">No</text>
  <rect x="544" y="446" width="126" height="44" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="607" y="468" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Print error and exit</text>

  <line x1="340" y1="520" x2="340" y2="576" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="352" y="551" text-anchor="start" style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;">Yes</text>

  <!-- 5. Fetch, validate, clean, write FASTA -->
  <rect x="210" y="576" width="260" height="60" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="597" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Fetch or load, validate, clean,</text>
  <text x="340" y="617" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">and write FASTA to disk</text>

  <line x1="340" y1="636" x2="340" y2="697" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- 6. Load successful? diamond -->
  <polygon points="340,697 450,749 340,801 230,749" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="749" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Load successful?</text>

  <line x1="450" y1="749" x2="544" y2="749" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="497" y="737" text-anchor="middle" style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;">No</text>
  <rect x="544" y="727" width="126" height="44" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="607" y="749" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Print error and exit</text>

  <line x1="340" y1="801" x2="340" y2="857" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="352" y="832" text-anchor="start" style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;">Yes</text>

  <!-- 7. Scan six reading frames -->
  <rect x="210" y="857" width="260" height="60" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="878" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Scan all six reading frames</text>
  <text x="340" y="898" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Find all ORFs above minimum length</text>

  <line x1="340" y1="917" x2="340" y2="973" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- 8. Any ORFs found? diamond -->
  <polygon points="340,973 450,1025 340,1077 230,1025" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="1025" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Any ORFs found?</text>

  <line x1="450" y1="1025" x2="544" y2="1025" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="497" y="1013" text-anchor="middle" style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;">No</text>
  <rect x="544" y="1003" width="126" height="44" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="607" y="1025" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Print warning</text>

  <line x1="340" y1="1077" x2="340" y2="1133" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="352" y="1108" text-anchor="start" style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;">Yes</text>

  <!-- 9. Print summary, write CSV, generate ORF map -->
  <rect x="210" y="1133" width="260" height="60" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="1154" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Print ORF summary, write CSV,</text>
  <text x="340" y="1174" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">and generate ORF map</text>

  <line x1="340" y1="1193" x2="340" y2="1249" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- 10. Calculate stats, detect repeats, write report -->
  <rect x="210" y="1249" width="260" height="60" rx="8" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="1270" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">Calculate statistics, detect repeats,</text>
  <text x="340" y="1290" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:400;">and write summary report</text>

  <line x1="340" y1="1309" x2="340" y2="1380" stroke="rgb(20,20,19)" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- DONE -->
  <rect x="270" y="1380" width="140" height="44" rx="22" fill="rgb(255,255,255)" stroke="rgb(20,20,19)" stroke-width="0.5" />
  <text x="340" y="1402" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:500;">Done</text>

</svg>
