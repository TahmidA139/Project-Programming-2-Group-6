     height="60"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect24" />
  <text
     x="340.64328"
     y="1247.491"
     text-anchor="middle"
     dominant-baseline="central"
