  <line
     x1="340.22946"
     y1="1364.2614"
     x2="340.22946"
     y2="1405.7336"
     stroke="#141413"
     stroke-width="1.36611"
     fill="none"
     marker-end="url(#arrow-3)"
     id="line26-6"
     style="marker-end:url(#arrow-3)" />
  <!-- Write summary report -->
  <rect
     x="210.62442"
     y="1327.4661"
     width="260.03772"
     height="37.604862"
     rx="8.0011606"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.462272"
