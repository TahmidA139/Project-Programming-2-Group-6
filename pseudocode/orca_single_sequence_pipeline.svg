     width="260"
     height="60"
     rx="8"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect22" />
  <text
     x="340"
     y="1143.2805"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:14px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413"
