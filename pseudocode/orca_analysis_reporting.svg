     stroke-width="1.5"
     fill="none"
     marker-end="url(#arrow)"
     id="line1" />
  <!-- Calculate per-ORF statistics -->
  <rect
     x="209.98242"
     y="222.32907"
     width="260.03516"
     height="53.951744"
     rx="8.0010824"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.5"
     id="rect2" />
  <text
     x="322.38638"
     y="254.39085"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:13.2765px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.948323"
     id="text2"
     transform="scale(1.0546352,0.94819521)">Calculate GC content and</text>
  <text
