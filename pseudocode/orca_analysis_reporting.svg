     x="46.089916"
     y="657.74811"
     width="218.08751"
     height="54.056656"
     rx="9.1826305"
     fill="#ffffff"
     stroke="#141413"
     stroke-width="0.508461"
     id="rect11" />
  <text
     x="158.49025"
     y="663.8847"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:12.3828px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.884488"
     id="text12"
     transform="scale(0.98112214,1.0192411)">Write orf_comparison_report.txt</text>
  <text
     x="140.98656"
     y="730.94751"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:13.2929px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.949497"
     id="text13"
     transform="scale(1.0532348,0.94945591)">to output directory</text>
  <!-- Right box continues down to write summary report -->
  <line
     x1="536.44611"
