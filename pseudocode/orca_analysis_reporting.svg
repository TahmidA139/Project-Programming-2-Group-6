     y2="658.42188"
     stroke="#141413"
     stroke-width="1.42425"
     fill="none"
     marker-end="url(#arrow)"
     id="line13" />
  <!-- Write single summary report box -->
  <rect
     x="433.21127"
     y="660.18738"
     width="190.00835"
     height="54.090366"
     rx="8.000351"
