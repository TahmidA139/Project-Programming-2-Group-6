     y="360.88525"
     text-anchor="middle"
     dominant-baseline="central"
     style="font-weight:400;font-size:13.2765px;font-family:'Anthropic Sans', '-apple-system', system-ui, 'Segoe UI', sans-serif;fill:#141413;stroke-width:0.948323"
